<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download isaahi-browser</title>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); display: flex; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 40px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
            max-width: 320px; width: 90%;
        }
        .icon { 
            width: 80px; height: 80px; background: var(--blue); 
            border-radius: 18px; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: bold;
        }
        h1 { font-size: 22px; margin: 0 0 8px; color: #1c1c1e; }
        p { color: #8e8e93; margin-bottom: 24px; font-size: 15px; }
        .download-btn { 
            display: block; background: var(--blue); color: white; 
            text-decoration: none; padding: 14px; border-radius: 12px; 
            font-weight: 600; transition: transform 0.2s;
        }
        .download-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">iB</div>
        <h1>isaahi-browser</h1>
        <p>Version 1.0.0 for isaahi-os</p>
        <a href="isaahi-browser.iapp" download class="download-btn">Download .iapp</a>
    </div>
</body>
</html>
